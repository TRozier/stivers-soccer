name: Supabase Keep-Alive

on:
  schedule:
    # Runs every day at 9:00 AM UTC — daily instead of every 3 days,
    # so a bad month-boundary gap (e.g. Jan 31 -> Mar 1) can't sneak past the 7-day pause window
    - cron: '0 9 * * *'
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab anytime

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          curl --fail -s -o response.txt -w "HTTP status: %{http_code}\n" \
            "https://ypezbqnhpklppspkzrrn.supabase.co/rest/v1/game_model_visits?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZXpicW5ocGtscHBzcGt6cnJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Mjc2NTMsImV4cCI6MjA5NjEwMzY1M30.K06pKjoqBAEbHi7SM_jyXMrRlppBTguf1l4lytJODoc" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZXpicW5ocGtscHBzcGt6cnJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Mjc2NTMsImV4cCI6MjA5NjEwMzY1M30.K06pKjoqBAEbHi7SM_jyXMrRlppBTguf1l4lytJODoc" \
          || (echo "PING FAILED — response body was:" && cat response.txt && exit 1)
          echo "Ping succeeded — response body:"
          cat response.txt
